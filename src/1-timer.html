<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <ul class="nav-list">
            <li class="nav-item">
              <a class="back-link" href="./index.html">Back to Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./2-snackbar.html"
                >Go to Promise Generator</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <h1 class="title">
          <span class="title-gradient">Timer</span>
        </h1>
      </div>
      <section class="timer-hero container">
        <input type="text" id="datetime-picker" />
        <button type="button" data-start>Start</button>

        <div class="timer">
          <div class="field">
            <span class="value" data-days>00</span>
            <span class="label">Days</span>
          </div>
          <div class="field">
            <span class="value" data-hours>00</span>
            <span class="label">Hours</span>
          </div>
          <div class="field">
            <span class="value" data-minutes>00</span>
            <span class="label">Minutes</span>
          </div>
          <div class="field">
            <span class="value" data-seconds>00</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      </section>
    </main>

    <p class="home-footer">
      Homework_02 for course Advanced JavaScript and TypeScript: Tools and Best
      Practices 2.0
    </p>

    <script type="module" src="./js/1-timer.js"></script>
  </body>
</html>
